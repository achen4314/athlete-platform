<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — Athlete Trace</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body {
      background: #f5f6f8;
    }
  </style>
</head>
<body>
  <div class="plain-layout">
    <div class="login-wrapper animate-fade-up">
      <div class="login-card" style="border:1px solid #e0e0e0;border-radius:8px;">
        <!-- 品牌 -->
        <div class="login-logo" style="font-weight:300;font-size:1.8rem;letter-spacing:4px;color:#2c3e50;">AT</div>
        <div class="login-brand-name" style="font-weight:400;color:#2c3e50;">Athlete Trace</div>
        <div class="login-brand-sub" style="color:#8899aa;font-weight:300;">运动数据科学平台</div>

        <!-- 登录表单 -->
        <form method="POST" action="{{ url_for('login') }}" autocomplete="off">
          <div class="form-group">
            <label class="form-label" for="username">用户名</label>
            <input
              type="text"
              id="username"
              name="username"
              class="form-input"
              placeholder="请输入用户名"
              required
              autofocus
            >
          </div>

          <div class="form-group">
            <label class="form-label" for="password">密码</label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="请输入密码"
              required
            >
          </div>

          <!-- 错误提示 -->
          {% if error %}
          <div style="color:var(--danger);font-size:0.8rem;margin-bottom:10px;text-align:center;">
            {{ error }}
          </div>
          {% endif %}

          <button type="submit" class="btn btn-primary btn-lg">登 录</button>
        </form>

        <div class="login-footer" style="color:#aaa;font-weight:300;">
          Athlete Trace · 运动数据科学平台
        </div>
      </div>
    </div>
  </div>
</body>
</html>
